name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # ジョブ全体を15分でタイムアウト（課金防止）

    strategy:
      matrix:
        node-version: [22.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: TypeScript type check
      id: typecheck
      run: npx tsc --noEmit
      timeout-minutes: 3
      continue-on-error: false

    - name: Build
      id: build
      run: npm run build
      timeout-minutes: 5
      continue-on-error: false
    
    - name: Run tests
      id: tests
      run: npm run test:ci
      timeout-minutes: 12
      continue-on-error: false
    
    - name: Report CI Summary
      if: always()
      run: |
        echo "## 🔍 CI Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| TypeScript Check | ${{ steps.typecheck.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ${{ steps.build.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Tests | ${{ steps.tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
