<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  
  <!-- Brain icon with mathematical symbols -->
  <g transform="translate(256, 256)">
    <!-- Brain outline -->
    <path d="M-80,-60 Q-100,-80 -100,-100 Q-100,-120 -80,-130 Q-60,-140 -40,-130 Q-20,-140 0,-140 Q20,-140 40,-130 Q60,-140 80,-130 Q100,-120 100,-100 Q100,-80 80,-60 L80,60 Q80,80 60,90 Q40,100 20,100 L-20,100 Q-40,100 -60,90 Q-80,80 -80,60 Z" 
          fill="url(#brain)" stroke="#fff" stroke-width="8"/>
    
    <!-- Left hemisphere details -->
    <path d="M-60,-80 Q-70,-60 -60,-40 Q-50,-20 -60,0 Q-70,20 -60,40" 
          fill="none" stroke="#fff" stroke-width="6" opacity="0.6"/>
    <path d="M-40,-70 Q-50,-50 -40,-30 Q-30,-10 -40,10 Q-50,30 -40,50" 
          fill="none" stroke="#fff" stroke-width="5" opacity="0.5"/>
    
    <!-- Right hemisphere details -->
    <path d="M60,-80 Q70,-60 60,-40 Q50,-20 60,0 Q70,20 60,40" 
          fill="none" stroke="#fff" stroke-width="6" opacity="0.6"/>
    <path d="M40,-70 Q50,-50 40,-30 Q30,-10 40,10 Q50,30 40,50" 
          fill="none" stroke="#fff" stroke-width="5" opacity="0.5"/>
    
    <!-- Mathematical symbols overlay -->
    <g transform="translate(-90, -20)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#fff" opacity="0.9">+</text>
    </g>
    <g transform="translate(70, -30)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#fff" opacity="0.9">×</text>
    </g>
    <g transform="translate(-15, 20)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="45" font-weight="bold" fill="#fff" opacity="0.95">=</text>
    </g>
    <g transform="translate(65, 50)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#fff" opacity="0.9">?</text>
    </g>
  </g>
  
  <!-- Small sparkles -->
  <circle cx="100" cy="100" r="8" fill="#fbbf24" opacity="0.8"/>
  <circle cx="410" cy="120" r="6" fill="#fbbf24" opacity="0.7"/>
  <circle cx="130" cy="390" r="7" fill="#fbbf24" opacity="0.8"/>
  <circle cx="400" cy="370" r="9" fill="#fbbf24" opacity="0.9"/>
</svg>
